name: Release

on:
  push:
    tags:
      - "**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example 1.13.0"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve release metadata
        id: meta
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' is not a SemVer release tag."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release tag exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --silent >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' does not exist in ${GITHUB_REPOSITORY}."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          submodules: recursive
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/main.js

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            build/main.js
            build/manifest.json
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.build.outputs.tag }}
          PRERELEASE: ${{ needs.build.outputs.prerelease }}
        run: |
          flags=(--title "$TAG" --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then
            flags+=(--prerelease)
          fi
          gh release create "$TAG" "${flags[@]}" main.js manifest.json
